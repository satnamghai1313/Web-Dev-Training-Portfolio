<body>
        <!-- Internet connection is must for console to print and fo j.s -->
    <!-- NOW TO SHOW SAME 10 USERS KA JSON DATA API SE LIYA THAA JO DATA
    IN TABULAR FORM  -->
    <!-- TABLE CREATE KARKE AAPAN EH ID DE VICH USERSDATA LIKHNA WAA -->
     <!-- <tbody id="usersData"></tbody> -->
    <div class="container">

    <button type="button" class="btn btn-primary" 
    onclick="callAPI()">Call Api</button>

      <!-- <table> -->

      <table class="table table-bordered">
         <!-- <table class="table table-bordered"></table>  this is written to set
          outline around id,email and all headings..-->
        <thead>
            <tr>
                <th>Id</th>
                <th>Name</th>
                <th>Email</th>
                <th>Phone Number</th>
                <th>Address</th>
                <th>Photo</th>
                <th>Country</th>
                <th>State</th>
            </tr>
        </thead>
        <tbody id="usersdata"></tbody>
        <!-- iske badh ka saara data tr and td wala part saara 
         likha hee html+= ke andar for of 
         wali loop mee -->
      </table>
      </div>
     <!--  -->
     <script>
        function renderHTML(data){
              var html = ``;    

    //         for(var x of data){
    //             html += `
    //      <div class="col-md-3">
    //     <div class="card">
    //         <img src="${x.photo}" alt="">
    //         <div class="card-body">
    //             <!-- <h4>API JSON DATA PHOTO</h4> -->
    //             <h5>${x.name}</h5>
    //         </div>
    //     </div>
    // </div>`;
            // }
            for (var x of data){
                html += ` <tr>
                
                    <!-- ABB KEYS KA NAAM CONSOLE SE DEKH KAR TD KE ANDAR ACCURATELY 
                        LIKHNA HEE ALONG WITH SYNTAX ${x.KEYNAME} -->
                <td>${x.id}</td>
                <td>${x.name}</td>
                <td>${x.email}</td>
                <td>${x.phone}</td>
                <td>${x.address}</td>
                <!-- <td>${x.photo}</td>-->
                  <!-- photo aaise sidha nahi aayegi img src tag ke andar likhan padega 
                    iska src toh hi aayegi as i did below -->
                <td> <img src="${x.photo}" alt=""></td>
                <td>${x.country}</td>
                <td>${x.state}</td>
                </tr>`
            }
            document.getElementById(`usersdata`).innerHTML = html;
        }
        function callAPI(){
            var url ="https://fake-json-api.mock.beeceptor.com/users";
            
           fetch(url)
        .then((response) => response.json())
        .then((data) => {
            console.log(data);
            renderHTML(data)
        })
        }

    
  
    </script>
